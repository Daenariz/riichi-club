<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kokushi Musou - Riichi Club{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar" style="background: rgba(0,0,0,0.8); padding: 10px; color: white;">
        <a href="{{ url_for('home.index') }}" style="color: white;">Home</a>
        {% if current_user.is_anonymous %}
            <a href="{{ url_for('home.login') }}" style="color: white;">Login</a>
        {% else %}
            <a href="{{ url_for('home.user', username=current_user.username) }}" style="color: white;">Profile</a>
            <a href="{{ url_for('home.logout') }}" style="color: white;">Logout</a>
        {% endif %}
    </nav>

    <div class="main-container">
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul style="color: #d4af37;">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

</body>
</html>
